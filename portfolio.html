<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我的持股 × 每日預測</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=JetBrains+Mono:wght@400;700&display=swap');
:root{
  --bg:#0a0c10;--s1:#111318;--s2:#161b25;--s3:#1e2330;
  --bd:#252a38;--gold:#f0b429;--gold2:#ffe080;
  --red:#ff4d5e;--grn:#27d981;--blu:#3d8bff;
  --pur:#a855f7;--txt:#e4eaf5;--dim:#6a748f;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background:
  radial-gradient(ellipse 60% 40% at 15% 0%,rgba(39,217,129,.05) 0%,transparent 60%),
  radial-gradient(ellipse 50% 50% at 85% 100%,rgba(168,85,247,.04) 0%,transparent 60%);
  pointer-events:none;z-index:0;}
.w{max-width:1000px;margin:0 auto;padding:0 20px 48px;position:relative;z-index:1;}

/* header */
header{padding:18px 0 14px;border-bottom:1px solid var(--bd);margin-bottom:20px;
  display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;}
.logo{display:flex;align-items:center;gap:10px;}
.li{width:34px;height:34px;background:linear-gradient(135deg,var(--grn),#16a34a);
  border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:16px;
  box-shadow:0 0 16px rgba(39,217,129,.3);}
.logo h1{font-size:1.15rem;font-weight:700;}
.logo h1 span{color:var(--grn);}
.nav{display:flex;gap:7px;flex-wrap:wrap;}
.back-btn{padding:7px 14px;border-radius:8px;border:1px solid var(--bd);background:var(--s1);
  color:var(--dim);font-size:.8rem;cursor:pointer;font-family:'Noto Sans TC',sans-serif;
  text-decoration:none;display:inline-flex;align-items:center;gap:5px;transition:all .15s;}
.back-btn:hover{border-color:var(--gold);color:var(--gold);}

/* add form */
.add-bar{background:var(--s1);border:1px solid var(--bd);border-radius:12px;
  padding:16px 18px;margin-bottom:16px;
  display:grid;grid-template-columns:1fr 1fr 1fr auto;gap:10px;align-items:end;}
@media(max-width:600px){.add-bar{grid-template-columns:1fr 1fr;}}
.fg{display:flex;flex-direction:column;gap:5px;}
.fl{font-size:.71rem;font-weight:700;color:var(--dim);text-transform:uppercase;letter-spacing:.07em;}
.fi{padding:9px 11px;background:var(--s2);border:1px solid var(--bd);border-radius:8px;
  color:var(--txt);font-family:'Noto Sans TC',sans-serif;font-size:.84rem;width:100%;}
.fi:focus{outline:none;border-color:var(--grn);}
.btn-add{padding:10px 20px;border-radius:8px;border:none;background:var(--grn);color:#000;
  font-family:'Noto Sans TC',sans-serif;font-size:.88rem;font-weight:700;cursor:pointer;
  white-space:nowrap;transition:all .18s;}
.btn-add:hover{background:#16d468;transform:translateY(-1px);}

/* toolbar */
.toolbar{display:flex;align-items:center;justify-content:space-between;
  margin-bottom:14px;flex-wrap:wrap;gap:8px;}
.tb-left{display:flex;align-items:center;gap:10px;}
.tb-title{font-size:.95rem;font-weight:700;}
.update-badge{padding:3px 10px;border-radius:12px;font-size:.72rem;
  background:var(--s2);border:1px solid var(--bd);color:var(--dim);}
.update-badge.fresh{background:rgba(39,217,129,.08);border-color:rgba(39,217,129,.25);color:var(--grn);}
.btn-refresh{padding:8px 16px;border-radius:8px;border:none;
  background:linear-gradient(135deg,var(--pur),#7c3aed);color:#fff;
  font-family:'Noto Sans TC',sans-serif;font-size:.84rem;font-weight:700;
  cursor:pointer;transition:all .18s;box-shadow:0 3px 10px rgba(168,85,247,.3);}
.btn-refresh:hover{transform:translateY(-1px);box-shadow:0 5px 16px rgba(168,85,247,.45);}
.btn-refresh:disabled{opacity:.6;cursor:not-allowed;transform:none;}

/* progress bar */
.prog-bar-outer{height:3px;background:var(--bd);border-radius:2px;
  margin-bottom:14px;overflow:hidden;display:none;}
.prog-bar-inner{height:100%;background:linear-gradient(90deg,var(--pur),#a78bfa);
  border-radius:2px;transition:width .4s ease;width:0;}

/* stock card */
.stock-list{display:grid;gap:14px;}
.sc{background:var(--s1);border:1px solid var(--bd);border-radius:14px;overflow:hidden;}

/* top section: basic info */
.sc-top{padding:14px 16px;display:grid;grid-template-columns:1fr auto;gap:12px;align-items:start;}
.sc-identity{display:flex;align-items:center;gap:9px;flex-wrap:wrap;margin-bottom:8px;}
.sc-code{font-family:'JetBrains Mono',monospace;font-size:1.05rem;font-weight:700;}
.sc-name{font-size:.82rem;color:var(--dim);}

/* price info row */
.price-row{display:flex;gap:16px;flex-wrap:wrap;align-items:center;}
.pr-item{display:flex;flex-direction:column;gap:2px;}
.pr-label{font-size:.67rem;color:var(--dim);text-transform:uppercase;letter-spacing:.06em;}
.pr-val{font-family:'JetBrains Mono',monospace;font-size:.9rem;font-weight:600;}

/* pnl summary bar */
.pnl-bar{padding:10px 16px;background:var(--s2);
  display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:10px;
  border-top:1px solid var(--bd);}
.pnl-item{text-align:center;}
.pnl-label{font-size:.67rem;color:var(--dim);margin-bottom:3px;}
.pnl-val{font-family:'JetBrains Mono',monospace;font-size:.92rem;font-weight:700;}
.up{color:var(--red);}
.dn{color:var(--grn);}
.neu{color:var(--dim);}

/* prediction section */
.sc-pred{padding:14px 16px;border-top:1px solid rgba(255,255,255,.04);}
.pred-loading{text-align:center;padding:20px;color:var(--dim);font-size:.82rem;}
.pred-spinner{width:20px;height:20px;border:2px solid var(--bd);border-top-color:var(--pur);
  border-radius:50%;animation:sp .8s linear infinite;margin:0 auto 8px;}
@keyframes sp{to{transform:rotate(360deg);}}

/* 3-column prediction layout */
.pred-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;}
@media(max-width:540px){.pred-grid{grid-template-columns:1fr;}}

.pred-col{background:var(--s2);border-radius:10px;padding:12px;}
.pred-col-title{font-size:.69rem;font-weight:700;text-transform:uppercase;
  letter-spacing:.08em;color:var(--dim);margin-bottom:10px;}

/* direction block */
.dir-badge{display:flex;align-items:center;gap:8px;padding:10px 12px;
  border-radius:8px;margin-bottom:8px;}
.dir-badge.up{background:rgba(255,77,94,.1);border:1px solid rgba(255,77,94,.25);}
.dir-badge.dn{background:rgba(39,217,129,.1);border:1px solid rgba(39,217,129,.25);}
.dir-badge.flat{background:rgba(106,116,143,.1);border:1px solid var(--bd);}
.dir-icon{font-size:1.4rem;}
.dir-text{font-size:1.1rem;font-weight:700;}
.dir-conf{font-size:.75rem;color:var(--dim);margin-top:2px;}

/* prob bars */
.prob-row{display:flex;align-items:center;gap:6px;margin-bottom:5px;}
.prob-label{font-size:.7rem;width:28px;text-align:center;}
.prob-track{flex:1;height:7px;background:var(--bd);border-radius:3px;overflow:hidden;}
.prob-fill{height:100%;border-radius:3px;}
.prob-pct{font-size:.7rem;font-family:monospace;width:32px;text-align:right;color:var(--dim);}

/* pnl calc */
.pnl-scenario{display:flex;flex-direction:column;gap:6px;}
.scenario-row{display:flex;justify-content:space-between;align-items:center;
  padding:6px 8px;border-radius:6px;background:var(--s3);}
.scenario-label{font-size:.74rem;color:var(--dim);}
.scenario-val{font-family:'JetBrains Mono',monospace;font-size:.82rem;font-weight:600;}

/* action block */
.action-card{padding:8px 10px;border-radius:8px;margin-bottom:7px;
  display:flex;align-items:flex-start;gap:8px;}
.action-icon{font-size:1rem;flex-shrink:0;margin-top:1px;}
.action-text{font-size:.79rem;line-height:1.55;}
.action-title{font-weight:700;margin-bottom:2px;}
.action-green{background:rgba(39,217,129,.07);border:1px solid rgba(39,217,129,.18);}
.action-red{background:rgba(255,77,94,.07);border:1px solid rgba(255,77,94,.18);}
.action-gold{background:rgba(240,180,41,.07);border:1px solid rgba(240,180,41,.18);}
.action-blue{background:rgba(61,139,255,.07);border:1px solid rgba(61,139,255,.18);}

/* delete btn */
.btn-del{padding:5px 10px;border-radius:6px;border:1px solid var(--bd);
  background:transparent;color:var(--dim);font-size:.75rem;cursor:pointer;
  transition:all .15s;flex-shrink:0;}
.btn-del:hover{border-color:var(--red);color:var(--red);}

/* group tabs */
.group-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px;}
.gtab{padding:7px 16px;border-radius:20px;border:1px solid var(--bd);
  background:var(--s1);color:var(--dim);font-size:.82rem;cursor:pointer;
  font-family:'Noto Sans TC',sans-serif;transition:all .15s;white-space:nowrap;}
.gtab:hover{border-color:var(--gold);color:var(--gold);}
.gtab.active{font-weight:700;}
.gtab .gcnt{font-size:.7rem;opacity:.7;margin-left:4px;}

/* group header */
.group-header{display:flex;align-items:center;gap:10px;
  padding:10px 14px;border-radius:10px;margin-bottom:10px;margin-top:6px;}
.group-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.group-name{font-size:.88rem;font-weight:700;}
.group-summary{font-size:.75rem;color:var(--dim);margin-left:auto;}

/* group rename input */
.grename{background:transparent;border:none;border-bottom:1px solid var(--bd);
  color:var(--txt);font-family:'Noto Sans TC',sans-serif;font-size:.88rem;
  font-weight:700;width:120px;outline:none;padding:2px 4px;}
.grename:focus{border-bottom-color:var(--gold);}

/* empty / loading */
.empty{text-align:center;padding:48px 20px;color:var(--dim);}
.ei{font-size:2.4rem;margin-bottom:10px;opacity:.35;}
.big-spinner{width:32px;height:32px;border:3px solid var(--bd);border-top-color:var(--grn);
  border-radius:50%;animation:sp .8s linear infinite;margin:0 auto 14px;}

/* toast */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
  background:var(--s2);border:1px solid var(--bd);border-radius:9px;
  padding:10px 20px;font-size:.83rem;color:var(--txt);
  box-shadow:0 8px 28px rgba(0,0,0,.4);opacity:0;transition:opacity .25s;
  z-index:999;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;}
.toast.ok{border-color:rgba(39,217,129,.4);color:var(--grn);}
.toast.err{border-color:rgba(255,77,94,.4);color:var(--red);}
</style>
</head>
<body>
<div class="w">

<header>
  <div class="logo">
    <div class="li">💼</div>
    <h1>我的<span>持股</span> × 每日預測</h1>
  </div>
  <div class="nav">
    <a class="back-btn" href="predict.html">🤖 AI預測</a>
    <a class="back-btn" href="backtest.html">📊 回測</a>
    <a class="back-btn" href="index.html">← 選股</a>
  </div>
</header>

<!-- 新增持股 -->
<div class="add-bar">
  <div class="fg">
    <label class="fl">股票代號 *</label>
    <input class="fi" id="addCode" type="text" placeholder="例：2330" maxlength="6">
  </div>
  <div class="fg">
    <label class="fl">買入成本（元）</label>
    <input class="fi" id="addCost" type="number" placeholder="例：150.5" step="0.01">
  </div>
  <div class="fg">
    <label class="fl">持有張數</label>
    <input class="fi" id="addQty" type="number" value="1" min="1">
  </div>
  <div class="fg">
    <label class="fl">群組</label>
    <select class="fi" id="addGroup">
      <option value="0">群組 1</option>
      <option value="1">群組 2</option>
      <option value="2">群組 3</option>
      <option value="3">群組 4</option>
      <option value="4">群組 5</option>
    </select>
  </div>
  <button class="btn-add" onclick="addStock()">＋ 加入</button>
</div>

<!-- 工具列 -->
<div class="toolbar">
  <div class="tb-left">
    <span class="tb-title">📋 持股總覽</span>
    <span class="update-badge" id="updateBadge">尚未更新</span>
  </div>
  <button class="btn-refresh" id="refreshBtn" onclick="runPredict()">
    🌲 更新今日預測
  </button>
</div>

<!-- 進度條 -->
<div class="prog-bar-outer" id="progOuter">
  <div class="prog-bar-inner" id="progInner"></div>
</div>

<!-- 群組 Tabs -->
<div class="group-tabs" id="groupTabs"></div>

<!-- 持股清單 -->
<div id="stockList">
  <div class="empty"><div class="big-spinner"></div>載入中...</div>
</div>

</div>
<div class="toast" id="toast"></div>

<script>
const API = (window.location.hostname==='localhost'||window.location.hostname==='127.0.0.1'||window.location.protocol==='file:')
  ? 'http://localhost:5000' : '';

// 群組設定（存 localStorage）
const GROUP_COLORS = ['#f0b429','#3d8bff','#27d981','#a855f7','#ff4d5e'];
const GROUP_BG     = ['rgba(240,180,41,.12)','rgba(61,139,255,.12)','rgba(39,217,129,.12)',
                      'rgba(168,85,247,.12)','rgba(255,77,94,.12)'];
const GROUP_BD     = ['rgba(240,180,41,.3)','rgba(61,139,255,.3)','rgba(39,217,129,.3)',
                      'rgba(168,85,247,.3)','rgba(255,77,94,.3)'];

function loadGroupNames() {
  try { return JSON.parse(localStorage.getItem('groupNames') || 'null') || ['群組1','群組2','群組3','群組4','群組5']; }
  catch { return ['群組1','群組2','群組3','群組4','群組5']; }
}
function saveGroupNames(names) {
  localStorage.setItem('groupNames', JSON.stringify(names));
}

let portfolioData = [];
let activeGroup   = -1;  // -1 = 全部
let groupNames    = loadGroupNames();

// 更新 select 選項
function syncGroupSelect() {
  const sel = document.getElementById('addGroup');
  if (!sel) return;
  sel.innerHTML = groupNames.map((n,i)=>
    `<option value="${i}">${n}</option>`).join('');
}

// ─────────────────────────────────────────────────────
// 群組 Tabs
// ─────────────────────────────────────────────────────
function renderGroupTabs(stocks) {
  const el = document.getElementById('groupTabs');
  const counts = [0,0,0,0,0];
  stocks.forEach(s => { const g = s.group ?? 0; counts[g] = (counts[g]||0)+1; });
  const total = stocks.length;

  let html = `<button class="gtab ${activeGroup===-1?'active':''}"
    style="${activeGroup===-1?`background:var(--s2);border-color:var(--gold);color:var(--gold);`:''}"
    onclick="setGroup(-1)">全部 <span class="gcnt">${total}</span></button>`;

  groupNames.forEach((name, i) => {
    const cnt = counts[i] || 0;
    const isActive = activeGroup === i;
    html += `<button class="gtab ${isActive?'active':''}"
      style="${isActive ? `background:${GROUP_BG[i]};border-color:${GROUP_COLORS[i]};color:${GROUP_COLORS[i]};` : ''}"
      onclick="setGroup(${i})">
      <span style="display:inline-block;width:8px;height:8px;border-radius:50%;
        background:${GROUP_COLORS[i]};margin-right:5px;vertical-align:middle;"></span>
      <span id="gtname-${i}" ondblclick="startRename(${i})">${name}</span>
      <span class="gcnt">${cnt}</span>
    </button>`;
  });

  el.innerHTML = html;
}

function setGroup(idx) {
  activeGroup = idx;
  renderGroupTabs(portfolioData);
  renderAll(portfolioData);
}

function startRename(idx) {
  const span = document.getElementById(`gtname-${idx}`);
  if (!span) return;
  const cur = groupNames[idx];
  span.outerHTML = `<input class="grename" id="grename-${idx}" value="${cur}"
    onblur="finishRename(${idx})" onkeydown="if(event.key==='Enter')finishRename(${idx})"
    onclick="event.stopPropagation()">`;
  document.getElementById(`grename-${idx}`)?.focus();
}

function finishRename(idx) {
  const input = document.getElementById(`grename-${idx}`);
  if (!input) return;
  const newName = input.value.trim() || groupNames[idx];
  groupNames[idx] = newName;
  saveGroupNames(groupNames);
  syncGroupSelect();
  renderGroupTabs(portfolioData);
}

// ─────────────────────────────────────────────────────
// 載入持股
// ─────────────────────────────────────────────────────
async function loadPortfolio() {
  try {
    const r    = await fetch(`${API}/api/portfolio`);
    const data = await r.json();
    portfolioData = data.stocks || [];
    renderGroupTabs(portfolioData);
    renderAll(portfolioData);
    const updated = portfolioData[0]?.last_update || '';
    const badge   = document.getElementById('updateBadge');
    if (updated && updated !== '—') {
      const isToday = updated.startsWith(data.today);
      badge.textContent = `最後更新：${updated}`;
      badge.className   = 'update-badge' + (isToday ? ' fresh' : '');
    }
  } catch(e) {
    document.getElementById('stockList').innerHTML =
      `<div class="empty"><div class="ei">⚠️</div><p>${e.message}</p></div>`;
  }
}

// ─────────────────────────────────────────────────────
// 渲染持股（依群組篩選）
// ─────────────────────────────────────────────────────
function renderAll(stocks) {
  const el = document.getElementById('stockList');
  const filtered = activeGroup === -1
    ? stocks
    : stocks.filter(s => (s.group ?? 0) === activeGroup);

  if (!stocks.length) {
    el.innerHTML = '<div class="empty"><div class="ei">💼</div><p>尚無持股，請在上方新增</p></div>';
    return;
  }
  if (!filtered.length) {
    el.innerHTML = `<div class="empty"><div class="ei">📂</div>
      <p>${groupNames[activeGroup]} 尚無股票</p></div>`;
    return;
  }

  // 全部模式：依群組分組顯示
  if (activeGroup === -1) {
    let html = '';
    for (let g = 0; g < 5; g++) {
      const group = stocks.filter(s => (s.group ?? 0) === g);
      if (!group.length) continue;
      // 群組統計
      const totalCost = group.reduce((a,s) => a+(s.cost*s.qty*1000||0), 0);
      const totalMkt  = group.reduce((a,s) => a+(s.cur_price*s.qty*1000||0), 0);
      const grpPnl    = totalCost > 0 ? ((totalMkt-totalCost)/totalCost*100).toFixed(1) : '0.0';
      const grpPnlCls = grpPnl >= 0 ? 'up' : 'dn';

      html += `
      <div class="group-header" style="background:${GROUP_BG[g]};border:1px solid ${GROUP_BD[g]};">
        <div class="group-dot" style="background:${GROUP_COLORS[g]};"></div>
        <span class="group-name" style="color:${GROUP_COLORS[g]};">${groupNames[g]}</span>
        <span style="font-size:.76rem;color:var(--dim);">${group.length} 支</span>
        <span class="group-summary">
          市值 ${Math.round(totalMkt).toLocaleString()} 元 ／
          損益 <span class="${grpPnlCls}">${grpPnl>=0?'+':''}${grpPnl}%</span>
        </span>
      </div>
      <div class="stock-list" style="margin-bottom:18px;">${group.map(s=>buildCard(s)).join('')}</div>`;
    }
    el.innerHTML = html;
  } else {
    el.innerHTML = `<div class="stock-list">${filtered.map(s=>buildCard(s)).join('')}</div>`;
  }
}

function buildCard(s) {
  const cur     = s.cur_price  || 0;
  const cost    = s.cost       || 0;
  const qty     = s.qty        || 1;
  const pnlPct  = s.pnl_pct   || 0;
  const pnlAmt  = s.pnl_amt   || 0;
  const chg     = s.chg        || 0;
  const chgPct  = s.chg_pct   || 0;
  const mktVal  = Math.round(cur * qty * 1000);
  const costVal = Math.round(cost * qty * 1000);
  const grp     = s.group ?? 0;

  const pCls    = pnlPct >= 0 ? 'up' : 'dn';
  const chgCls  = chg    >= 0 ? 'up' : 'dn';
  const predBlock = buildPredBlock(s.pred_today, cur, cost, qty);

  return `
  <div class="sc" id="sc-${s.code}" style="border-left:3px solid ${GROUP_COLORS[grp]};">
    <div class="sc-top">
      <div>
        <div class="sc-identity">
          <span class="sc-code">${s.code}</span>
          <span class="sc-name">${s.name || s.code}</span>
          <span style="font-size:.68rem;padding:2px 8px;border-radius:10px;
            background:${GROUP_BG[grp]};color:${GROUP_COLORS[grp]};
            border:1px solid ${GROUP_BD[grp]};">${groupNames[grp]}</span>
        </div>
        <div class="price-row">
          <div class="pr-item">
            <span class="pr-label">現價</span>
            <span class="pr-val">${cur}</span>
          </div>
          <div class="pr-item">
            <span class="pr-label">今日漲跌</span>
            <span class="pr-val ${chgCls}">${chg>=0?'+':''}${chg}（${chgPct>=0?'+':''}${chgPct}%）</span>
          </div>
          <div class="pr-item">
            <span class="pr-label">成本</span>
            <span class="pr-val">${cost}</span>
          </div>
          <div class="pr-item">
            <span class="pr-label">持有</span>
            <span class="pr-val">${qty} 張</span>
          </div>
        </div>
      </div>
      <div style="display:flex;flex-direction:column;gap:5px;align-items:flex-end;">
        <button class="btn-del" onclick="delStock('${s.code}')">✕ 移除</button>
        <select style="background:var(--s2);border:1px solid var(--bd);border-radius:6px;
          color:var(--dim);font-size:.72rem;padding:3px 6px;cursor:pointer;font-family:'Noto Sans TC',sans-serif;"
          onchange="moveGroup('${s.code}', this.value)">
          ${groupNames.map((n,i)=>`<option value="${i}" ${i===grp?'selected':''}>${n}</option>`).join('')}
        </select>
      </div>
    </div>
    <div class="pnl-bar">
      <div class="pnl-item">
        <div class="pnl-label">持倉損益 %</div>
        <div class="pnl-val ${pCls}">${pnlPct>=0?'+':''}${pnlPct}%</div>
      </div>
      <div class="pnl-item">
        <div class="pnl-label">持倉損益 元</div>
        <div class="pnl-val ${pCls}">${pnlAmt>=0?'+':''}${pnlAmt.toLocaleString()}</div>
      </div>
      <div class="pnl-item">
        <div class="pnl-label">目前市值</div>
        <div class="pnl-val">${mktVal.toLocaleString()}</div>
      </div>
      <div class="pnl-item">
        <div class="pnl-label">投入成本</div>
        <div class="pnl-val neu">${costVal.toLocaleString()}</div>
      </div>
    </div>
    <div class="sc-pred">${predBlock}</div>
  </div>`;
}

// 移動群組（不重新載入，只更新 local + API）
async function moveGroup(code, newGroup) {
  const s = portfolioData.find(x => x.code === code);
  if (!s) return;
  s.group = parseInt(newGroup);
  try {
    await fetch(`${API}/api/portfolio`, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({code: s.code, cost: s.cost, qty: s.qty, group: s.group}),
    });
    renderGroupTabs(portfolioData);
    renderAll(portfolioData);
    showToast(`✅ 已移至 ${groupNames[parseInt(newGroup)]}`,'ok');
  } catch(e) { showToast('更新失敗','err'); }
}

// ─────────────────────────────────────────────────────
// 預測三欄：方向 | 損益試算 | 建議操作
// ─────────────────────────────────────────────────────
function buildPredBlock(p, cur, cost, qty) {
  if (!p) {
    return `<div class="pred-loading" style="padding:16px;text-align:center;color:var(--dim);font-size:.82rem;">
      尚無預測資料，點右上角「更新今日預測」</div>`;
  }
  if (p.error) {
    return `<div style="text-align:center;padding:12px;color:var(--dim);font-size:.78rem;">⚠️ ${p.error}</div>`;
  }

  const dir     = p.direction;
  const conf    = p.confidence || 0;
  const probs   = p.probs || {};
  const rLow    = p.range_low  || 0;
  const rHigh   = p.range_high || 0;
  const dirCls  = dir==='漲'?'up':dir==='跌'?'dn':'flat';
  const dirIcon = dir==='漲'?'🟢':dir==='跌'?'🔴':'⚪';

  // 損益試算
  const bestCase   = Math.round(cur * (1 + rHigh/100) * qty * 1000);
  const worstCase  = Math.round(cur * (1 + rLow/100)  * qty * 1000);
  const midCase    = Math.round(cur * (1 + (rLow+rHigh)/2/100) * qty * 1000);
  const curVal     = Math.round(cur * qty * 1000);
  const costVal    = Math.round(cost * qty * 1000);

  const bestPnl    = bestCase  - costVal;
  const worstPnl   = worstCase - costVal;
  const midPnl     = midCase   - costVal;

  function fmtAmt(v) {
    const s = v>=0?'+':'';
    return `<span class="${v>=0?'up':'dn'}">${s}${v.toLocaleString()}</span>`;
  }

  // 建議操作邏輯
  const pnlPct = cost>0 ? (cur-cost)/cost*100 : 0;
  const actions = buildActions(dir, conf, probs, pnlPct, rLow, rHigh, cur, p.tp_suggest, p.sl_suggest);

  return `
  <div class="pred-grid">

    <!-- 欄1：預測方向 -->
    <div class="pred-col">
      <div class="pred-col-title">📡 預測方向（10日後）</div>
      <div class="dir-badge ${dirCls}">
        <span class="dir-icon">${dirIcon}</span>
        <div>
          <div class="dir-text">${dir}</div>
          <div class="dir-conf">信心度 ${conf}%</div>
        </div>
      </div>
      <div style="margin-top:8px;">
        <div class="prob-row">
          <span class="prob-label" style="color:var(--red);">漲</span>
          <div class="prob-track"><div class="prob-fill" style="width:${probs['漲']||0}%;background:var(--red);"></div></div>
          <span class="prob-pct">${probs['漲']||0}%</span>
        </div>
        <div class="prob-row">
          <span class="prob-label" style="color:var(--grn);">跌</span>
          <div class="prob-track"><div class="prob-fill" style="width:${probs['跌']||0}%;background:var(--grn);"></div></div>
          <span class="prob-pct">${probs['跌']||0}%</span>
        </div>
        <div class="prob-row">
          <span class="prob-label" style="color:var(--dim);">平</span>
          <div class="prob-track"><div class="prob-fill" style="width:${probs['持平']||0}%;background:var(--dim);"></div></div>
          <span class="prob-pct">${probs['持平']||0}%</span>
        </div>
      </div>
      <div style="margin-top:8px;padding:7px 9px;background:var(--s3);border-radius:7px;font-size:.73rem;color:var(--dim);">
        預期區間：<span style="color:var(--txt);">${rLow>=0?'+':''}${rLow}% ~ ${rHigh>=0?'+':''}${rHigh}%</span>
      </div>
    </div>

    <!-- 欄2：損益試算 -->
    <div class="pred-col">
      <div class="pred-col-title">💰 損益試算（${qty}張）</div>
      <div class="pnl-scenario">
        <div class="scenario-row">
          <span class="scenario-label">📈 樂觀（漲 ${rHigh>=0?'+':''}${rHigh}%）</span>
          <span class="scenario-val">${fmtAmt(bestPnl)}</span>
        </div>
        <div class="scenario-row">
          <span class="scenario-label">➡️ 中性（均值）</span>
          <span class="scenario-val">${fmtAmt(midPnl)}</span>
        </div>
        <div class="scenario-row">
          <span class="scenario-label">📉 悲觀（跌 ${rLow}%）</span>
          <span class="scenario-val">${fmtAmt(worstPnl)}</span>
        </div>
        <div style="height:1px;background:var(--bd);margin:4px 0;"></div>
        <div class="scenario-row">
          <span class="scenario-label">目前持倉損益</span>
          <span class="scenario-val">${fmtAmt(curVal-costVal)}</span>
        </div>
        <div class="scenario-row" style="background:rgba(240,180,41,.06);">
          <span class="scenario-label" style="color:var(--gold);">樂觀累計損益</span>
          <span class="scenario-val" style="color:var(--gold);">${fmtAmt(bestCase-costVal)}</span>
        </div>
      </div>
    </div>

    <!-- 欄3：建議操作 -->
    <div class="pred-col">
      <div class="pred-col-title">🎯 建議操作</div>
      ${actions}
    </div>

  </div>`;
}

function buildActions(dir, conf, probs, pnlPct, rLow, rHigh, cur, tp, sl) {
  const actions = [];

  // 主要建議
  if (dir === '漲' && conf >= 60) {
    actions.push({cls:'action-green', icon:'✅',
      title:'建議持有',
      desc:`模型看漲（信心${conf}%），預期可繼續上漲 ${rHigh}%，建議持有至目標價。`});
  } else if (dir === '跌' && conf >= 60) {
    actions.push({cls:'action-red', icon:'⚠️',
      title:'建議考慮減碼',
      desc:`模型看跌（信心${conf}%），預期可能下跌 ${Math.abs(rLow)}%，可考慮設定停損或部分出場。`});
  } else {
    actions.push({cls:'action-blue', icon:'ℹ️',
      title:'方向不明確',
      desc:`信心度僅 ${conf}%，建議觀望，不宜大幅調整倉位。`});
  }

  // 停利建議
  if (tp && tp > cur) {
    actions.push({cls:'action-gold', icon:'🎯',
      title:`停利參考價：${tp} 元`,
      desc:`根據歷史同類行情，漲幅中位數約 +${rHigh}%，可設此為停利點。`});
  }

  // 停損建議
  if (sl && sl < cur) {
    actions.push({cls:'action-red', icon:'🛡️',
      title:`停損參考價：${sl} 元`,
      desc:`建議不低於此價位，保護本金，避免損失擴大。`});
  }

  // 持倉損益建議
  if (pnlPct >= 15) {
    actions.push({cls:'action-gold', icon:'💡',
      title:'獲利已達 15%+',
      desc:'可考慮分批出場，鎖住部分獲利，降低回撤風險。'});
  } else if (pnlPct <= -8) {
    actions.push({cls:'action-red', icon:'🔔',
      title:'虧損超過 8%',
      desc:'建議評估是否停損出場，避免損失持續擴大。'});
  }

  if (!actions.length) {
    actions.push({cls:'action-blue', icon:'📋',
      title:'維持現況',
      desc:'目前無特別操作建議，持續關注市場走勢。'});
  }

  return actions.map(a => `
    <div class="action-card ${a.cls}">
      <span class="action-icon">${a.icon}</span>
      <div class="action-text">
        <div class="action-title">${a.title}</div>
        <div style="color:var(--dim);">${a.desc}</div>
      </div>
    </div>`).join('');
}

// ─────────────────────────────────────────────────────
// 新增 / 刪除
// ─────────────────────────────────────────────────────
async function addStock() {
  const code  = document.getElementById('addCode').value.trim().toUpperCase();
  const cost  = parseFloat(document.getElementById('addCost').value) || 0;
  const qty   = parseInt(document.getElementById('addQty').value)    || 1;
  const group = parseInt(document.getElementById('addGroup').value)  || 0;
  if (!code) { showToast('請輸入股票代號','err'); return; }
  try {
    const r = await fetch(`${API}/api/portfolio`, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({code, cost, qty, group}),
    });
    const d = await r.json();
    if (d.ok) {
      showToast(`✅ ${code} 已加入 ${groupNames[group]}`,'ok');
      document.getElementById('addCode').value = '';
      document.getElementById('addCost').value = '';
      document.getElementById('addQty').value  = '1';
      loadPortfolio();
    }
  } catch(e) { showToast('加入失敗：'+e.message,'err'); }
}

async function delStock(code) {
  if (!confirm(`確定移除 ${code}？`)) return;
  try {
    await fetch(`${API}/api/portfolio/${code}`, {method:'DELETE'});
    showToast(`已移除 ${code}`,'ok');
    loadPortfolio();
  } catch(e) { showToast('移除失敗','err'); }
}

// ─────────────────────────────────────────────────────
// 更新今日預測
// ─────────────────────────────────────────────────────
async function runPredict() {
  const btn = document.getElementById('refreshBtn');
  btn.disabled = true;
  btn.textContent = '⏳ 訓練中...';

  // 顯示每張卡的 loading 狀態
  document.querySelectorAll('.sc-pred').forEach(el => {
    el.innerHTML = `<div class="pred-loading"><div class="pred-spinner"></div>隨機森林訓練中...</div>`;
  });

  const progOuter = document.getElementById('progOuter');
  const progInner = document.getElementById('progInner');
  progOuter.style.display = 'block';
  progInner.style.width = '5%';

  try {
    const r = await fetch(`${API}/api/portfolio/run_predict`, {
      method:'POST', headers:{'Content-Type':'application/json'}, body:'{}',
    });
    const d = await r.json();
    if (!d.ok) throw new Error(d.msg || '啟動失敗');

    // 輪詢進度
    let pct = 5;
    const timer = setInterval(async () => {
      pct = Math.min(pct + 3, 92);
      progInner.style.width = pct + '%';

      // 嘗試重新載入看看有沒有結果
      try {
        const rr   = await fetch(`${API}/api/portfolio`);
        const data = await rr.json();
        const updated = data.stocks?.[0]?.last_update || '';
        const badge   = document.getElementById('updateBadge');

        if (updated && updated !== '—') {
          const today = data.today;
          const isToday = updated.startsWith(today);
          badge.textContent = `最後更新：${updated}`;
          badge.className   = 'update-badge' + (isToday ? ' fresh' : '');
          portfolioData = data.stocks || [];

          if (isToday) {
            clearInterval(timer);
            progInner.style.width = '100%';
            setTimeout(() => { progOuter.style.display='none'; progInner.style.width='0'; }, 600);
            renderAll(portfolioData);
            btn.disabled = false;
            btn.textContent = '🌲 更新今日預測';
            showToast('✅ 預測完成！','ok');
          }
        }
      } catch(e) {}
    }, 4000);

    // 最多等 10 分鐘
    setTimeout(() => {
      clearInterval(timer);
      progOuter.style.display='none';
      btn.disabled = false;
      btn.textContent = '🌲 更新今日預測';
      loadPortfolio();
    }, 600000);

  } catch(e) {
    progOuter.style.display = 'none';
    btn.disabled = false;
    btn.textContent = '🌲 更新今日預測';
    showToast('失敗：'+e.message,'err');
  }
}

// ─────────────────────────────────────────────────────
// Toast
// ─────────────────────────────────────────────────────
function showToast(msg, type='ok') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className   = `toast show ${type}`;
  setTimeout(() => el.className = 'toast', 3500);
}

// ─────────────────────────────────────────────────────
syncGroupSelect();
loadPortfolio();
</script>
