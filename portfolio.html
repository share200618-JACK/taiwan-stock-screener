<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我的持股 × 每日預測</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=JetBrains+Mono:wght@400;700&display=swap');
:root{
  --bg:#0a0c10;--s1:#111318;--s2:#161b25;--s3:#1e2330;
  --bd:#252a38;--gold:#f0b429;--gold2:#ffe080;
  --red:#ff4d5e;--grn:#27d981;--blu:#3d8bff;
  --pur:#a855f7;--txt:#e4eaf5;--dim:#6a748f;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background:
  radial-gradient(ellipse 60% 40% at 15% 0%,rgba(39,217,129,.05) 0%,transparent 60%),
  radial-gradient(ellipse 50% 50% at 85% 100%,rgba(168,85,247,.04) 0%,transparent 60%);
  pointer-events:none;z-index:0;}
.w{max-width:1050px;margin:0 auto;padding:0 18px 56px;position:relative;z-index:1;}

header{padding:16px 0 13px;border-bottom:1px solid var(--bd);margin-bottom:18px;
  display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;}
.logo{display:flex;align-items:center;gap:9px;}
.li{width:32px;height:32px;background:linear-gradient(135deg,var(--grn),#16a34a);
  border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;
  box-shadow:0 0 14px rgba(39,217,129,.3);}
.logo h1{font-size:1.1rem;font-weight:700;}
.logo h1 span{color:var(--grn);}
.nav{display:flex;gap:6px;flex-wrap:wrap;}
.back-btn{padding:6px 12px;border-radius:7px;border:1px solid var(--bd);background:var(--s1);
  color:var(--dim);font-size:.78rem;cursor:pointer;font-family:'Noto Sans TC',sans-serif;
  text-decoration:none;display:inline-flex;align-items:center;gap:4px;transition:all .15s;}
.back-btn:hover{border-color:var(--gold);color:var(--gold);}

/* page tabs */
.page-tabs{display:flex;gap:0;margin-bottom:18px;background:var(--s1);
  border:1px solid var(--bd);border-radius:10px;overflow:hidden;}
.ptab{flex:1;padding:10px;text-align:center;font-size:.84rem;cursor:pointer;
  color:var(--dim);transition:all .18s;border:none;font-family:'Noto Sans TC',sans-serif;
  background:transparent;}
.ptab.active{background:var(--s2);color:var(--txt);font-weight:700;}
.ptab:hover:not(.active){color:var(--txt);}

/* form */
.card{background:var(--s1);border:1px solid var(--bd);border-radius:12px;
  padding:16px;margin-bottom:14px;}
.card-title{font-size:.76rem;font-weight:700;text-transform:uppercase;
  letter-spacing:.09em;color:var(--dim);margin-bottom:12px;
  display:flex;align-items:center;gap:7px;}
.dot{width:7px;height:7px;border-radius:50%;}
.form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));
  gap:9px;align-items:end;}
.fg{display:flex;flex-direction:column;gap:4px;}
.fl{font-size:.69rem;font-weight:700;color:var(--dim);text-transform:uppercase;letter-spacing:.07em;}
.fi,.fs{padding:8px 10px;background:var(--s2);border:1px solid var(--bd);border-radius:7px;
  color:var(--txt);font-family:'Noto Sans TC',sans-serif;font-size:.82rem;width:100%;}
.fi:focus,.fs:focus{outline:none;border-color:var(--grn);}
.hint{font-size:.68rem;color:var(--dim);margin-top:3px;}
.btn{padding:9px 16px;border-radius:8px;border:none;font-family:'Noto Sans TC',sans-serif;
  font-size:.84rem;font-weight:700;cursor:pointer;transition:all .18s;white-space:nowrap;}
.btn-grn{background:var(--grn);color:#000;}
.btn-grn:hover{background:#16d468;transform:translateY(-1px);}
.btn-red{background:rgba(255,77,94,.15);color:var(--red);border:1px solid rgba(255,77,94,.3);}
.btn-red:hover{background:rgba(255,77,94,.25);}
.btn-pur{background:linear-gradient(135deg,var(--pur),#7c3aed);color:#fff;
  box-shadow:0 3px 10px rgba(168,85,247,.28);}
.btn-pur:hover{transform:translateY(-1px);box-shadow:0 5px 16px rgba(168,85,247,.4);}
.btn-pur:disabled{opacity:.6;cursor:not-allowed;transform:none;}
.btn-gold{background:var(--gold);color:#000;}
.btn-gold:hover{background:var(--gold2);}
.btn-sm{padding:5px 10px;border-radius:6px;border:1px solid var(--bd);
  background:transparent;color:var(--dim);font-size:.72rem;cursor:pointer;
  transition:all .15s;font-family:'Noto Sans TC',sans-serif;}
.btn-sm:hover{border-color:var(--red);color:var(--red);}

/* group tabs */
.group-tabs{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:14px;}
.gtab{padding:6px 14px;border-radius:18px;border:1px solid var(--bd);
  background:var(--s1);color:var(--dim);font-size:.8rem;cursor:pointer;
  font-family:'Noto Sans TC',sans-serif;transition:all .15s;}
.gtab:hover{border-color:var(--gold);color:var(--gold);}
.gtab.active{font-weight:700;}
.grename{background:transparent;border:none;border-bottom:1px solid var(--bd);
  color:var(--txt);font-family:'Noto Sans TC',sans-serif;font-size:.8rem;
  font-weight:700;width:80px;outline:none;padding:1px 3px;}
.grename:focus{border-bottom-color:var(--gold);}

/* toolbar */
.toolbar{display:flex;align-items:center;justify-content:space-between;
  margin-bottom:12px;flex-wrap:wrap;gap:8px;}
.update-badge{padding:3px 9px;border-radius:10px;font-size:.7rem;
  background:var(--s2);border:1px solid var(--bd);color:var(--dim);}
.update-badge.fresh{background:rgba(39,217,129,.08);border-color:rgba(39,217,129,.25);color:var(--grn);}

/* progress */
.prog-outer{height:3px;background:var(--bd);border-radius:2px;
  margin-bottom:12px;overflow:hidden;display:none;}
.prog-inner{height:100%;background:linear-gradient(90deg,var(--pur),#a78bfa);
  border-radius:2px;transition:width .4s ease;width:0;}

/* stock card */
.stock-list{display:grid;gap:12px;}
.sc{background:var(--s1);border:1px solid var(--bd);border-radius:13px;overflow:hidden;}

.sc-top{padding:13px 15px;display:grid;grid-template-columns:1fr auto;gap:10px;}
.sc-id{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:7px;}
.sc-code{font-family:'JetBrains Mono',monospace;font-size:1rem;font-weight:700;}
.sc-name{font-size:.8rem;color:var(--dim);}
.grp-tag{font-size:.66rem;padding:2px 7px;border-radius:9px;}

.info-row{display:flex;gap:14px;flex-wrap:wrap;}
.ir{display:flex;flex-direction:column;gap:1px;}
.ir-l{font-size:.65rem;color:var(--dim);text-transform:uppercase;letter-spacing:.06em;}
.ir-v{font-family:'JetBrains Mono',monospace;font-size:.87rem;font-weight:600;}

/* pnl bar */
.pnl-bar{padding:9px 15px;background:var(--s2);
  display:grid;grid-template-columns:repeat(auto-fit,minmax(90px,1fr));gap:8px;
  border-top:1px solid var(--bd);}
.pi{text-align:center;}
.pi-l{font-size:.64rem;color:var(--dim);margin-bottom:2px;}
.pi-v{font-family:'JetBrains Mono',monospace;font-size:.88rem;font-weight:700;}
.up{color:var(--red);}
.dn{color:var(--grn);}
.neu{color:var(--dim);}

/* fee breakdown */
.fee-row{padding:9px 15px;border-top:1px solid var(--bd);
  display:flex;gap:12px;flex-wrap:wrap;font-size:.72rem;color:var(--dim);}
.fee-item span{color:var(--txt);font-family:'JetBrains Mono',monospace;margin-left:3px;}

/* prediction */
.sc-pred{padding:13px 15px;border-top:1px solid rgba(255,255,255,.04);}
.pred-spinner{width:18px;height:18px;border:2px solid var(--bd);border-top-color:var(--pur);
  border-radius:50%;animation:sp .8s linear infinite;display:inline-block;vertical-align:middle;
  margin-right:7px;}
@keyframes sp{to{transform:rotate(360deg);}}

.pred-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}
@media(max-width:520px){.pred-grid{grid-template-columns:1fr;}}
.pred-col{background:var(--s2);border-radius:9px;padding:11px;}
.pred-col-title{font-size:.67rem;font-weight:700;text-transform:uppercase;
  letter-spacing:.08em;color:var(--dim);margin-bottom:9px;}

.dir-badge{display:flex;align-items:center;gap:7px;padding:9px 10px;
  border-radius:7px;margin-bottom:7px;}
.dir-badge.up{background:rgba(255,77,94,.1);border:1px solid rgba(255,77,94,.25);}
.dir-badge.dn{background:rgba(39,217,129,.1);border:1px solid rgba(39,217,129,.25);}
.dir-badge.flat{background:rgba(106,116,143,.1);border:1px solid var(--bd);}
.dir-icon{font-size:1.3rem;}
.dir-text{font-size:1rem;font-weight:700;}
.dir-conf{font-size:.72rem;color:var(--dim);margin-top:1px;}

.prob-row{display:flex;align-items:center;gap:5px;margin-bottom:4px;}
.prob-label{font-size:.67rem;width:26px;text-align:center;}
.prob-track{flex:1;height:6px;background:var(--bd);border-radius:3px;overflow:hidden;}
.prob-fill{height:100%;border-radius:3px;}
.prob-pct{font-size:.67rem;font-family:monospace;width:30px;text-align:right;color:var(--dim);}

.scenario-row{display:flex;justify-content:space-between;align-items:center;
  padding:5px 7px;border-radius:5px;background:var(--s3);margin-bottom:4px;}
.s-label{font-size:.71rem;color:var(--dim);}
.s-val{font-family:'JetBrains Mono',monospace;font-size:.79rem;font-weight:600;}

.action-card{padding:7px 9px;border-radius:7px;margin-bottom:6px;
  display:flex;align-items:flex-start;gap:7px;}
.ac-icon{font-size:.95rem;flex-shrink:0;margin-top:1px;}
.ac-text{font-size:.76rem;line-height:1.5;}
.ac-title{font-weight:700;margin-bottom:1px;}
.action-green{background:rgba(39,217,129,.07);border:1px solid rgba(39,217,129,.18);}
.action-red{background:rgba(255,77,94,.07);border:1px solid rgba(255,77,94,.18);}
.action-gold{background:rgba(240,180,41,.07);border:1px solid rgba(240,180,41,.18);}
.action-blue{background:rgba(61,139,255,.07);border:1px solid rgba(61,139,255,.18);}

/* sell modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;
  display:none;align-items:center;justify-content:center;}
.modal-bg.open{display:flex;}
.modal{background:var(--s1);border:1px solid var(--bd);border-radius:14px;
  padding:22px;width:min(400px,90vw);}
.modal-title{font-size:1rem;font-weight:700;margin-bottom:16px;}
.modal-grid{display:grid;gap:10px;margin-bottom:16px;}
.modal-btns{display:flex;gap:8px;justify-content:flex-end;}

/* history table */
.hist-table{width:100%;border-collapse:collapse;font-size:.78rem;}
.hist-table thead tr{background:var(--s2);}
.hist-table th{padding:9px 12px;text-align:left;font-size:.67rem;color:var(--dim);
  font-weight:700;text-transform:uppercase;letter-spacing:.06em;white-space:nowrap;}
.hist-table td{padding:9px 12px;border-bottom:1px solid rgba(255,255,255,.03);}
.hist-table tr:last-child td{border-bottom:none;}
.hist-table tr:hover td{background:rgba(255,255,255,.015);}
.mono{font-family:'JetBrains Mono',monospace;}

/* analysis */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:16px;}
.stat-card{background:var(--s2);border:1px solid var(--bd);border-radius:10px;padding:12px;}
.stat-label{font-size:.67rem;color:var(--dim);margin-bottom:5px;text-transform:uppercase;letter-spacing:.06em;}
.stat-val{font-family:'JetBrains Mono',monospace;font-size:1.3rem;font-weight:700;}
.stat-sub{font-size:.68rem;color:var(--dim);margin-top:2px;}

.suggest-card{padding:12px 14px;border-radius:9px;margin-bottom:8px;
  display:flex;align-items:flex-start;gap:10px;}
.suggest-card.warning{background:rgba(240,180,41,.07);border:1px solid rgba(240,180,41,.2);}
.suggest-card.danger{background:rgba(255,77,94,.07);border:1px solid rgba(255,77,94,.2);}
.suggest-card.success{background:rgba(39,217,129,.07);border:1px solid rgba(39,217,129,.2);}
.suggest-card.info{background:rgba(61,139,255,.07);border:1px solid rgba(61,139,255,.2);}
.suggest-icon{font-size:1.2rem;flex-shrink:0;}
.suggest-title{font-weight:700;font-size:.85rem;margin-bottom:3px;}
.suggest-desc{font-size:.78rem;color:var(--dim);line-height:1.55;}

/* empty / loading */
.empty{text-align:center;padding:40px;color:var(--dim);}
.ei{font-size:2.2rem;margin-bottom:8px;opacity:.3;}
.big-spin{width:28px;height:28px;border:2.5px solid var(--bd);border-top-color:var(--grn);
  border-radius:50%;animation:sp .8s linear infinite;margin:0 auto 12px;}

/* group header */
.grp-header{display:flex;align-items:center;gap:9px;padding:8px 12px;
  border-radius:9px;margin-bottom:9px;margin-top:5px;}

/* toast */
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);
  background:var(--s2);border:1px solid var(--bd);border-radius:8px;
  padding:9px 18px;font-size:.81rem;color:var(--txt);
  box-shadow:0 8px 28px rgba(0,0,0,.4);opacity:0;transition:opacity .22s;
  z-index:999;pointer-events:none;}
.toast.show{opacity:1;}
.toast.ok{border-color:rgba(39,217,129,.4);color:var(--grn);}
.toast.err{border-color:rgba(255,77,94,.4);color:var(--red);}
</style>
</head>
<body>
<div class="w">

<header>
  <div class="logo">
    <div class="li">💼</div>
    <h1>我的<span>持股</span> × 每日預測</h1>
  </div>
  <div class="nav">
    <a class="back-btn" href="predict.html">🤖 AI預測</a>
    <a class="back-btn" href="backtest.html">📊 回測</a>
    <a class="back-btn" href="index.html">← 選股</a>
  </div>
</header>

<!-- 頁面 Tabs -->
<div class="page-tabs">
  <button class="ptab active" onclick="showPage('holdings')">💼 持股總覽</button>
  <button class="ptab" onclick="showPage('history')">📋 歷史紀錄</button>
  <button class="ptab" onclick="showPage('analysis')">📊 績效分析</button>
</div>

<!-- ══════ 持股總覽 ══════ -->
<div id="page-holdings">

  <!-- 新增持股 -->
  <div class="card">
    <div class="card-title"><div class="dot" style="background:var(--grn)"></div>新增持股</div>
    <div class="form-grid">
      <div class="fg">
        <label class="fl">股票代號 *</label>
        <input class="fi" id="addCode" type="text" placeholder="例：2330" maxlength="6">
      </div>
      <div class="fg">
        <label class="fl">買入成本（元）</label>
        <input class="fi" id="addCost" type="number" placeholder="例：150.5" step="0.01">
      </div>
      <div class="fg">
        <label class="fl">持有張數</label>
        <input class="fi" id="addQty" type="number" value="1" min="1">
      </div>
      <div class="fg">
        <label class="fl">買入日期</label>
        <input class="fi" id="addDate" type="date">
      </div>
      <div class="fg">
        <label class="fl">融資成數</label>
        <select class="fs" id="addMargin">
          <option value="1.0">不融資（現股）</option>
          <option value="1.6">融資 6 成</option>
          <option value="1.7">融資 7 成</option>
          <option value="2.0">融資全額</option>
        </select>
        <div class="hint">台股融資年利率約 6.35%</div>
      </div>
      <div class="fg">
        <label class="fl">群組</label>
        <select class="fs" id="addGroup">
          <option value="0">群組 1</option>
          <option value="1">群組 2</option>
          <option value="2">群組 3</option>
          <option value="3">群組 4</option>
          <option value="4">群組 5</option>
        </select>
      </div>
      <div class="fg" style="justify-content:flex-end;">
        <button class="btn btn-grn" onclick="addStock()">＋ 加入持股</button>
      </div>
    </div>
  </div>

  <!-- 工具列 -->
  <div class="toolbar">
    <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
      <div class="group-tabs" id="groupTabs" style="margin-bottom:0;"></div>
      <span class="update-badge" id="updateBadge">尚未更新</span>
    </div>
    <button class="btn btn-pur" id="refreshBtn" onclick="runPredict()" style="font-size:.8rem;padding:8px 14px;">
      🌲 更新今日預測
    </button>
  </div>
  <div class="prog-outer" id="progOuter"><div class="prog-inner" id="progInner"></div></div>

  <div id="stockList"><div class="empty"><div class="big-spin"></div>載入中...</div></div>
</div>

<!-- ══════ 歷史紀錄 ══════ -->
<div id="page-history" style="display:none;">
  <div class="toolbar">
    <span style="font-weight:700;font-size:.95rem;">📋 已實現交易紀錄</span>
    <span id="histCount" style="font-size:.76rem;color:var(--dim);"></span>
  </div>
  <div style="overflow-x:auto;background:var(--s1);border:1px solid var(--bd);border-radius:12px;overflow:hidden;">
    <table class="hist-table">
      <thead>
        <tr>
          <th>股票</th><th>買入日</th><th>賣出日</th><th>持有</th>
          <th>買入價</th><th>賣出價</th><th>張數</th><th>融資</th>
          <th>毛損益</th><th>稅費</th><th>淨損益</th><th>淨報酬%</th><th>結果</th>
        </tr>
      </thead>
      <tbody id="histBody"></tbody>
    </table>
  </div>
  <div id="histEmpty" class="empty" style="display:none;">
    <div class="ei">📋</div><p>尚無歷史紀錄，賣出持股後自動記錄</p>
  </div>
</div>

<!-- ══════ 績效分析 ══════ -->
<div id="page-analysis" style="display:none;">
  <div id="analysisContent"><div class="empty"><div class="big-spin"></div>載入分析中...</div></div>
</div>

</div>

<!-- 賣出 Modal -->
<div class="modal-bg" id="sellModal">
  <div class="modal">
    <div class="modal-title">📤 賣出持股 — <span id="sellCodeLabel"></span></div>
    <div class="modal-grid">
      <div class="fg">
        <label class="fl">賣出價格（元）</label>
        <input class="fi" id="sellPrice" type="number" step="0.01" placeholder="輸入賣出價格">
      </div>
      <div class="fg">
        <label class="fl">賣出日期</label>
        <input class="fi" id="sellDate" type="date">
      </div>
      <div id="sellPreview" style="background:var(--s2);border-radius:8px;padding:10px;font-size:.78rem;display:none;"></div>
    </div>
    <div class="modal-btns">
      <button class="btn btn-sm" onclick="closeSellModal()" style="border-color:var(--bd);">取消</button>
      <button class="btn btn-gold" onclick="confirmSell()">確認賣出並記錄</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = (window.location.hostname==='localhost'||window.location.hostname==='127.0.0.1'||window.location.protocol==='file:')
  ? 'http://localhost:5000' : '';

const GRP_COLORS = ['#f0b429','#3d8bff','#27d981','#a855f7','#ff4d5e'];
const GRP_BG     = ['rgba(240,180,41,.12)','rgba(61,139,255,.12)','rgba(39,217,129,.12)',
                    'rgba(168,85,247,.12)','rgba(255,77,94,.12)'];
const GRP_BD     = ['rgba(240,180,41,.3)','rgba(61,139,255,.3)','rgba(39,217,129,.3)',
                    'rgba(168,85,247,.3)','rgba(255,77,94,.3)'];

function loadGroupNames(){
  try{return JSON.parse(localStorage.getItem('groupNames')||'null')||['群組1','群組2','群組3','群組4','群組5'];}
  catch{return['群組1','群組2','群組3','群組4','群組5'];}
}
function saveGroupNames(n){localStorage.setItem('groupNames',JSON.stringify(n));}

let portfolioData=[], activeGroup=-1, groupNames=loadGroupNames();
let sellCode='', sellStockData=null;

function syncGroupSelect(){
  const sel=document.getElementById('addGroup');
  if(!sel)return;
  sel.innerHTML=groupNames.map((n,i)=>`<option value="${i}">${n}</option>`).join('');
}

// ── 頁面切換 ─────────────────────────────────────────
function showPage(name){
  ['holdings','history','analysis'].forEach(p=>{
    document.getElementById(`page-${p}`).style.display = p===name?'':'none';
    document.querySelectorAll('.ptab')[['holdings','history','analysis'].indexOf(p)]
      .classList.toggle('active', p===name);
  });
  if(name==='history') loadHistory();
  if(name==='analysis') loadAnalysis();
}

// ── 群組 Tabs ─────────────────────────────────────────
function renderGroupTabs(stocks){
  const el=document.getElementById('groupTabs');
  const counts=Array(5).fill(0);
  stocks.forEach(s=>counts[s.group??0]++);
  let html=`<button class="gtab ${activeGroup===-1?'active':''}"
    style="${activeGroup===-1?`background:var(--s2);border-color:var(--gold);color:var(--gold);`:''}"
    onclick="setGroup(-1)">全部 <span style="opacity:.6;font-size:.7rem;">${stocks.length}</span></button>`;
  groupNames.forEach((name,i)=>{
    const isA=activeGroup===i;
    html+=`<button class="gtab ${isA?'active':''}"
      style="${isA?`background:${GRP_BG[i]};border-color:${GRP_COLORS[i]};color:${GRP_COLORS[i]};`:''}"
      onclick="setGroup(${i})">
      <span style="display:inline-block;width:7px;height:7px;border-radius:50%;
        background:${GRP_COLORS[i]};margin-right:4px;vertical-align:middle;"></span>
      <span id="gtname-${i}" ondblclick="startRename(${i})">${name}</span>
      <span style="opacity:.6;font-size:.7rem;"> ${counts[i]}</span>
    </button>`;
  });
  el.innerHTML=html;
}
function setGroup(idx){activeGroup=idx;renderGroupTabs(portfolioData);renderAll(portfolioData);}
function startRename(idx){
  const span=document.getElementById(`gtname-${idx}`);
  if(!span)return;
  span.outerHTML=`<input class="grename" id="grename-${idx}" value="${groupNames[idx]}"
    onblur="finishRename(${idx})" onkeydown="if(event.key==='Enter')finishRename(${idx})"
    onclick="event.stopPropagation()">`;
  document.getElementById(`grename-${idx}`)?.focus();
}
function finishRename(idx){
  const input=document.getElementById(`grename-${idx}`);
  if(!input)return;
  groupNames[idx]=input.value.trim()||groupNames[idx];
  saveGroupNames(groupNames);syncGroupSelect();renderGroupTabs(portfolioData);
}

// ── 載入持股 ─────────────────────────────────────────
async function loadPortfolio(){
  try{
    const r=await fetch(`${API}/api/portfolio`);
    const data=await r.json();
    portfolioData=data.stocks||[];
    renderGroupTabs(portfolioData);renderAll(portfolioData);
    const updated=portfolioData[0]?.last_update||'';
    const badge=document.getElementById('updateBadge');
    if(updated&&updated!=='—'){
      const isToday=updated.startsWith(data.today);
      badge.textContent=`最後更新：${updated}`;
      badge.className='update-badge'+(isToday?' fresh':'');
    }
  }catch(e){
    document.getElementById('stockList').innerHTML=
      `<div class="empty"><div class="ei">⚠️</div><p>${e.message}</p></div>`;
  }
}

// ── 渲染持股 ─────────────────────────────────────────
function renderAll(stocks){
  const el=document.getElementById('stockList');
  const filtered=activeGroup===-1?stocks:stocks.filter(s=>(s.group??0)===activeGroup);
  if(!stocks.length){el.innerHTML='<div class="empty"><div class="ei">💼</div><p>尚無持股，請在上方新增</p></div>';return;}
  if(!filtered.length){el.innerHTML=`<div class="empty"><div class="ei">📂</div><p>${groupNames[activeGroup]} 尚無股票</p></div>`;return;}

  if(activeGroup===-1){
    let html='';
    for(let g=0;g<5;g++){
      const grp=stocks.filter(s=>(s.group??0)===g);
      if(!grp.length)continue;
      const tm=grp.reduce((a,s)=>a+(s.cur_price*s.qty*1000||0),0);
      const tc=grp.reduce((a,s)=>a+(s.cost*s.qty*1000||0),0);
      const gp=tc>0?((tm-tc)/tc*100).toFixed(1):'0.0';
      html+=`<div class="grp-header" style="background:${GRP_BG[g]};border:1px solid ${GRP_BD[g]};">
        <div style="width:9px;height:9px;border-radius:50%;background:${GRP_COLORS[g]};flex-shrink:0;"></div>
        <span style="font-size:.86rem;font-weight:700;color:${GRP_COLORS[g]};">${groupNames[g]}</span>
        <span style="font-size:.73rem;color:var(--dim);">${grp.length} 支</span>
        <span style="margin-left:auto;font-size:.73rem;color:var(--dim);">
          市值 ${Math.round(tm).toLocaleString()} ／
          損益 <span class="${gp>=0?'up':'dn'}">${gp>=0?'+':''}${gp}%</span>
        </span>
      </div>
      <div class="stock-list" style="margin-bottom:16px;">${grp.map(s=>buildCard(s)).join('')}</div>`;
    }
    el.innerHTML=html;
  }else{
    el.innerHTML=`<div class="stock-list">${filtered.map(s=>buildCard(s)).join('')}</div>`;
  }
}

function buildCard(s){
  const cur=s.cur_price||0, cost=s.cost||0, qty=s.qty||1;
  const pPct=s.pnl_pct||0, nPct=s.net_pnl_pct||0;

  const chg=s.chg||0, chgP=s.chg_pct||0;
  const mktV=Math.round(cur*qty*1000), cstV=Math.round(cost*qty*1000);
  const grp=s.group??0;
  const margin=s.margin||1;
  const buyDate=s.buy_date||s.added||'—';

  const pCls=pPct>=0?'up':'dn', nCls=nPct>=0?'up':'dn', cCls=chg>=0?'up':'dn';
  const pred=buildPredBlock(s.pred_today, cur, cost, qty);

  return `<div class="sc" style="border-left:3px solid ${GRP_COLORS[grp]};">
    <div class="sc-top">
      <div>
        <div class="sc-id">
          <span class="sc-code">${s.code}</span>
          <span class="sc-name">${s.name||s.code}</span>
          <span class="grp-tag" style="background:${GRP_BG[grp]};color:${GRP_COLORS[grp]};border:1px solid ${GRP_BD[grp]};">${groupNames[grp]}</span>
          ${margin>1?`<span style="font-size:.66rem;padding:2px 6px;border-radius:8px;background:rgba(240,180,41,.1);color:var(--gold);border:1px solid rgba(240,180,41,.25);">融資 ${margin}x</span>`:''}
        </div>
        <div class="info-row">
          <div class="ir"><div class="ir-l">現價</div><div class="ir-v">${cur}</div></div>
          <div class="ir"><div class="ir-l">今日</div><div class="ir-v ${cCls}">${chg>=0?'+':''}${chg}（${chgP>=0?'+':''}${chgP}%）</div></div>
          <div class="ir"><div class="ir-l">成本</div><div class="ir-v">${cost}</div></div>
          <div class="ir"><div class="ir-l">持有</div><div class="ir-v">${qty}張</div></div>
          <div class="ir"><div class="ir-l">買入日</div><div class="ir-v">${buyDate}</div></div>
        </div>
      </div>
      <div style="display:flex;flex-direction:column;gap:5px;align-items:flex-end;">
        <button class="btn btn-red" onclick="openSellModal('${s.code}')" style="font-size:.76rem;padding:6px 11px;">📤 賣出</button>
        <button class="btn-sm" onclick="delStock('${s.code}')">✕ 移除</button>
        <select style="background:var(--s2);border:1px solid var(--bd);border-radius:5px;
          color:var(--dim);font-size:.69rem;padding:3px 5px;cursor:pointer;font-family:'Noto Sans TC',sans-serif;"
          onchange="moveGroup('${s.code}',this.value)">
          ${groupNames.map((n,i)=>`<option value="${i}" ${i===grp?'selected':''}>${n}</option>`).join('')}
        </select>
      </div>
    </div>

    <!-- 損益摘要 -->
    <div class="pnl-bar">
      <div class="pi"><div class="pi-l">毛損益%</div><div class="pi-v ${pCls}">${pPct>=0?'+':''}${pPct}%</div></div>
      <div class="pi"><div class="pi-l">淨損益%</div><div class="pi-v ${nCls}">${nPct>=0?'+':''}${nPct}%</div></div>
      <div class="pi"><div class="pi-l">毛損益元</div><div class="pi-v ${pCls}">${pAmt>=0?'+':''}${pAmt.toLocaleString()}</div></div>
      <div class="pi"><div class="pi-l">淨損益元</div><div class="pi-v ${nCls}">${nAmt>=0?'+':''}${nAmt.toLocaleString()}</div></div>
      <div class="pi"><div class="pi-l">市值</div><div class="pi-v">${mktV.toLocaleString()}</div></div>
    </div>

    <!-- 稅費明細 -->
    <div class="fee-row">
      <span>📄 稅費：</span>
      <span>買入手續費<span>${(s.buy_fee||0).toLocaleString()}</span></span>
      <span>賣出手續費<span>${(s.sell_fee||0).toLocaleString()}</span></span>
      <span>交易稅<span>${(s.sell_tax||0).toLocaleString()}</span></span>
      ${margin>1?`<span>融資利息<span>${(s.margin_interest||0).toLocaleString()}</span></span>`:''}
      <span style="color:var(--txt);font-weight:600;">合計<span>${(s.total_fee||0).toLocaleString()}</span></span>

// ── 預測三欄 ─────────────────────────────────────────
function buildPredBlock(p, cur, cost, qty){
  if(!p) return `<div style="text-align:center;padding:12px;color:var(--dim);font-size:.78rem;">
    尚無預測，點「更新今日預測」</div>`;
  if(p.error) return `<div style="text-align:center;padding:10px;color:var(--dim);font-size:.75rem;">⚠️ ${p.error}</div>`;

  const dir=p.direction, conf=p.confidence||0, probs=p.probs||{};
  const rLow=p.range_low||0, rHigh=p.range_high||0;
  const dCls=dir==='漲'?'up':dir==='跌'?'dn':'flat';
  const dIcon=dir==='漲'?'🟢':dir==='跌'?'🔴':'⚪';

  const bestV=Math.round(cur*(1+rHigh/100)*qty*1000);
  const wrstV=Math.round(cur*(1+rLow/100)*qty*1000);
  const midV =Math.round(cur*(1+(rLow+rHigh)/2/100)*qty*1000);
  const cstV =Math.round(cost*qty*1000);
  function fa(v){const s=v>=0?'+':'';return `<span class="${v>=0?'up':'dn'}">${s}${v.toLocaleString()}</span>`;}

  const pnlPct=cost>0?(cur-cost)/cost*100:0;
  const acts=buildActions(dir,conf,probs,pnlPct,rLow,rHigh,cur,p.tp_suggest,p.sl_suggest);

  return `<div class="pred-grid">
    <div class="pred-col">
      <div class="pred-col-title">📡 預測方向（10日後）</div>
      <div class="dir-badge ${dCls}">
        <span class="dir-icon">${dIcon}</span>
        <div><div class="dir-text">${dir}</div><div class="dir-conf">信心 ${conf}%</div></div>
      </div>
      <div>
        ${['漲','跌','持平'].map(l=>`
        <div class="prob-row">
          <span class="prob-label" style="color:${l==='漲'?'var(--red)':l==='跌'?'var(--grn)':'var(--dim)'};">${l==='持平'?'平':l}</span>
          <div class="prob-track"><div class="prob-fill" style="width:${probs[l]||0}%;background:${l==='漲'?'var(--red)':l==='跌'?'var(--grn)':'var(--dim)'};"></div></div>
          <span class="prob-pct">${probs[l]||0}%</span>
        </div>`).join('')}
      </div>
      <div style="margin-top:7px;padding:6px 8px;background:var(--s3);border-radius:6px;font-size:.7rem;color:var(--dim);">
        預期：<span style="color:var(--txt);">${rLow>=0?'+':''}${rLow}% ~ ${rHigh>=0?'+':''}${rHigh}%</span>
      </div>
    </div>
    <div class="pred-col">
      <div class="pred-col-title">💰 損益試算（${qty}張）</div>
      <div class="scenario-row"><span class="s-label">📈 樂觀 +${rHigh}%</span><span class="s-val">${fa(bestV-cstV)}</span></div>
      <div class="scenario-row"><span class="s-label">➡️ 中性</span><span class="s-val">${fa(midV-cstV)}</span></div>
      <div class="scenario-row"><span class="s-label">📉 悲觀 ${rLow}%</span><span class="s-val">${fa(wrstV-cstV)}</span></div>
      <div style="height:1px;background:var(--bd);margin:4px 0;"></div>
      <div class="scenario-row"><span class="s-label">目前持倉損益</span><span class="s-val">${fa(Math.round((cur-cost)*qty*1000))}</span></div>
      <div class="scenario-row" style="background:rgba(240,180,41,.06);">
        <span class="s-label" style="color:var(--gold);">樂觀累計</span>
        <span class="s-val" style="color:var(--gold);">${fa(bestV-cstV)}</span>
      </div>
    </div>
    <div class="pred-col">
      <div class="pred-col-title">🎯 建議操作</div>
      ${acts}
    </div>
  </div>`;
}

function buildActions(dir,conf,probs,pnlPct,rLow,rHigh,cur,tp,sl){
  const acts=[];
  if(dir==='漲'&&conf>=60) acts.push({cls:'action-green',icon:'✅',title:'建議持有',desc:`看漲（信心${conf}%），建議續抱至停利點。`});
  else if(dir==='跌'&&conf>=60) acts.push({cls:'action-red',icon:'⚠️',title:'建議考慮減碼',desc:`看跌（信心${conf}%），預期跌${Math.abs(rLow)}%，可設停損。`});
  else acts.push({cls:'action-blue',icon:'ℹ️',title:'方向不明確',desc:`信心${conf}%，建議觀望。`});
  if(tp&&tp>cur) acts.push({cls:'action-gold',icon:'🎯',title:`停利參考：${tp}元`,desc:`漲幅中位數+${rHigh}%，可設此停利。`});
  if(sl&&sl<cur) acts.push({cls:'action-red',icon:'🛡️',title:`停損參考：${sl}元`,desc:`建議不低於此價。`});
  if(pnlPct>=15) acts.push({cls:'action-gold',icon:'💡',title:'獲利 15%+',desc:'可考慮分批出場鎖利。'});
  else if(pnlPct<=-8) acts.push({cls:'action-red',icon:'🔔',title:'虧損超過 8%',desc:'建議評估停損。'});
  if(!acts.length) acts.push({cls:'action-blue',icon:'📋',title:'維持現況',desc:'無特別操作建議。'});
  return acts.map(a=>`<div class="action-card ${a.cls}"><span class="ac-icon">${a.icon}</span><div class="ac-text"><div class="ac-title">${a.title}</div><div style="color:var(--dim);">${a.desc}</div></div></div>`).join('');
}

// ── 新增/刪除/移群組 ─────────────────────────────────
async function addStock(){
  const code=document.getElementById('addCode').value.trim().toUpperCase();
  const cost=parseFloat(document.getElementById('addCost').value)||0;
  const qty=parseInt(document.getElementById('addQty').value)||1;
  const buyDate=document.getElementById('addDate').value;
  const margin=parseFloat(document.getElementById('addMargin').value)||1;
  const group=parseInt(document.getElementById('addGroup').value)||0;
  if(!code){showToast('請輸入股票代號','err');return;}
  try{
    const r=await fetch(`${API}/api/portfolio`,{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({code,cost,qty,buy_date:buyDate,margin,group})});
    const d=await r.json();
    if(d.ok){
      showToast(`✅ ${code} 已加入 ${groupNames[group]}`,'ok');
      document.getElementById('addCode').value='';
      document.getElementById('addCost').value='';
      document.getElementById('addQty').value='1';
      document.getElementById('addDate').value='';
      document.getElementById('addMargin').value='1.0';
      loadPortfolio();
    }
  }catch(e){showToast('加入失敗：'+e.message,'err');}
}

async function delStock(code){
  if(!confirm(`確定移除 ${code}？`))return;
  try{await fetch(`${API}/api/portfolio/${code}`,{method:'DELETE'});
    showToast(`已移除 ${code}`,'ok');loadPortfolio();}
  catch(e){showToast('移除失敗','err');}
}

async function moveGroup(code,g){
  const s=portfolioData.find(x=>x.code===code);
  if(!s)return;
  s.group=parseInt(g);
  try{
    await fetch(`${API}/api/portfolio`,{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({code:s.code,cost:s.cost,qty:s.qty,margin:s.margin||1,
        buy_date:s.buy_date||s.added,group:s.group})});
    renderGroupTabs(portfolioData);renderAll(portfolioData);
    showToast(`✅ 已移至 ${groupNames[parseInt(g)]}`,'ok');
  }catch(e){showToast('更新失敗','err');}
}

// ── 賣出 Modal ──────────────────────────────────────
function openSellModal(code){
  sellCode=code;
  sellStockData=portfolioData.find(s=>s.code===code);
  document.getElementById('sellCodeLabel').textContent=`${code} ${sellStockData?.name||''}`;
  document.getElementById('sellPrice').value='';
  document.getElementById('sellDate').value=new Date().toISOString().split('T')[0];
  document.getElementById('sellPreview').style.display='none';
  document.getElementById('sellModal').classList.add('open');
  document.getElementById('sellPrice').addEventListener('input',previewSell);
}
function closeSellModal(){document.getElementById('sellModal').classList.remove('open');}

function previewSell(){
  const sp=parseFloat(document.getElementById('sellPrice').value)||0;
  const s=sellStockData;
  if(!s||sp<=0){document.getElementById('sellPreview').style.display='none';return;}
  const qty=s.qty||1, cost=s.cost||0, margin=s.margin||1;
  const fee=0.001425, tax=0.003;
  const bFee=Math.round(cost*qty*1000*fee);
  const sFee=Math.round(sp*qty*1000*fee);
  const sTax=Math.round(sp*qty*1000*tax);
  const gross=(sp-cost)*qty*1000;
  const net=gross-bFee-sFee-sTax;
  const netPct=cost>0?((net/(cost*qty*1000/margin))*100).toFixed(2):0;
  const cls=net>=0?'up':'dn';
  document.getElementById('sellPreview').style.display='block';
  document.getElementById('sellPreview').innerHTML=`
    <div style="display:flex;gap:12px;flex-wrap:wrap;">
      <span>毛損益：<span class="${cls}" style="font-family:monospace;">${net>=0?'+':''}${Math.round(gross).toLocaleString()}</span></span>
      <span>稅費合計：<span style="font-family:monospace;color:var(--dim);">-${(bFee+sFee+sTax).toLocaleString()}</span></span>
      <span>淨損益：<span class="${cls}" style="font-family:monospace;font-weight:700;">${net>=0?'+':''}${Math.round(net).toLocaleString()}</span></span>
      <span>淨報酬率：<span class="${cls}" style="font-family:monospace;">${netPct>=0?'+':''}${netPct}%</span></span>
    </div>`;
}

async function confirmSell(){
  const sp=parseFloat(document.getElementById('sellPrice').value)||0;
  const sd=document.getElementById('sellDate').value;
  if(!sp){showToast('請輸入賣出價格','err');return;}
  try{
    const r=await fetch(`${API}/api/portfolio/sell`,{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({code:sellCode,sell_price:sp,sell_date:sd})});
    const d=await r.json();
    if(d.ok){
      closeSellModal();
      showToast(`✅ ${sellCode} 已賣出並記錄`,'ok');
      loadPortfolio();
    }else throw new Error(d.error);
  }catch(e){showToast('賣出失敗：'+e.message,'err');}
}

// ── 績效分析 ─────────────────────────────────────────
async function loadAnalysis(){
  const el=document.getElementById('analysisContent');
  el.innerHTML='<div class="empty"><div class="big-spin"></div>分析中...</div>';
  try{
    const r=await fetch(`${API}/api/portfolio/analysis`);
    const d=await r.json();
    if(d.error){el.innerHTML=`<div class="empty"><div class="ei">📊</div><p>${d.error}</p></div>`;return;}

    const wCls=d.win_rate>=55?'up':d.win_rate>=45?'neu':'dn';
    const pfCls=d.profit_factor>=1.5?'up':d.profit_factor>=1?'neu':'dn';
    const nCls=d.total_net_pnl>=0?'up':'dn';

    const suggestIcons={warning:'⚠️',danger:'🔴',success:'✅',info:'ℹ️'};
    const suggestCls={warning:'warning',danger:'danger',success:'success',info:'info'};

    el.innerHTML=`
    <div class="stat-grid">
      <div class="stat-card"><div class="stat-label">總交易次數</div><div class="stat-val">${d.total}</div></div>
      <div class="stat-card"><div class="stat-label">勝率</div><div class="stat-val ${wCls}">${d.win_rate}%</div><div class="stat-sub">獲利 ${d.total-d.total+Math.round(d.win_rate/100*d.total)} 虧損 ${d.total-Math.round(d.win_rate/100*d.total)}</div></div>
      <div class="stat-card"><div class="stat-label">獲利因子</div><div class="stat-val ${pfCls}">${d.profit_factor}</div><div class="stat-sub">平均獲利/平均虧損</div></div>
      <div class="stat-card"><div class="stat-label">平均獲利%</div><div class="stat-val up">+${d.avg_win_pct}%</div></div>
      <div class="stat-card"><div class="stat-label">平均虧損%</div><div class="stat-val dn">${d.avg_loss_pct}%</div></div>
      <div class="stat-card"><div class="stat-label">平均持有天數</div><div class="stat-val">${d.avg_hold_days}</div></div>
      <div class="stat-card"><div class="stat-label">累積淨損益</div><div class="stat-val ${nCls}">${d.total_net_pnl>=0?'+':''}${d.total_net_pnl?.toLocaleString()}</div></div>
      <div class="stat-card"><div class="stat-label">總稅費支出</div><div class="stat-val neu">-${d.total_fee?.toLocaleString()}</div><div class="stat-sub">手續費+交易稅</div></div>
    </div>

    ${d.quick_win_rate!==undefined?`
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;">
      <div class="stat-card"><div class="stat-label">短線（≤3日）勝率</div><div class="stat-val ${d.quick_win_rate>=50?'up':'dn'}">${d.quick_win_rate}%</div></div>
      <div class="stat-card"><div class="stat-label">長線（>20日）勝率</div><div class="stat-val ${d.long_win_rate>=50?'up':'dn'}">${d.long_win_rate}%</div></div>
    </div>`:''}

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;">
      <div class="stat-card">
        <div class="stat-label">🏆 最佳交易</div>
        <div style="margin-top:5px;font-size:.8rem;">
          <span class="mono" style="color:var(--gold);">${d.best_trade?.code}</span>
          <span style="color:var(--dim);margin-left:6px;">${d.best_trade?.sell_date||'—'}</span>
          <div class="mono up" style="font-size:1rem;margin-top:3px;">+${d.best_trade?.net_pnl_pct}%</div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-label">⚠️ 最差交易</div>
        <div style="margin-top:5px;font-size:.8rem;">
          <span class="mono" style="color:var(--red);">${d.worst_trade?.code}</span>
          <span style="color:var(--dim);margin-left:6px;">${d.worst_trade?.sell_date||'—'}</span>
          <div class="mono dn" style="font-size:1rem;margin-top:3px;">${d.worst_trade?.net_pnl_pct}%</div>
        </div>
      </div>
    </div>

    <div style="font-size:.8rem;font-weight:700;color:var(--dim);text-transform:uppercase;
      letter-spacing:.09em;margin-bottom:10px;">💡 需要加強的地方</div>
    ${(d.suggestions||[]).map(s=>`
    <div class="suggest-card ${suggestCls[s.type]||'info'}">
      <span class="suggest-icon">${suggestIcons[s.type]||'ℹ️'}</span>
      <div><div class="suggest-title">${s.title}</div><div class="suggest-desc">${s.desc}</div></div>
    </div>`).join('')}`;
  }catch(e){el.innerHTML=`<div class="empty"><div class="ei">⚠️</div><p>${e.message}</p></div>`;}
}

// ── 更新預測 ─────────────────────────────────────────
async function runPredict(){
  const btn=document.getElementById('refreshBtn');
  btn.disabled=true;btn.textContent='⏳ 訓練中...';
  document.querySelectorAll('.sc-pred').forEach(el=>{
    el.innerHTML=`<div style="text-align:center;padding:12px;color:var(--dim);font-size:.78rem;">
      <span class="pred-spinner"></span>隨機森林訓練中...</div>`;
  });
  const progOuter=document.getElementById('progOuter');
  const progInner=document.getElementById('progInner');
  progOuter.style.display='block';progInner.style.width='5%';
  try{
    await fetch(`${API}/api/portfolio/run_predict`,{method:'POST',headers:{'Content-Type':'application/json'},body:'{}'});
    let pct=5;
    const timer=setInterval(async()=>{
      pct=Math.min(pct+3,92);progInner.style.width=pct+'%';
      try{
        const rr=await fetch(`${API}/api/portfolio`);
        const data=await rr.json();
        const updated=data.stocks?.[0]?.last_update||'';
        const badge=document.getElementById('updateBadge');
        if(updated&&updated!=='—'){
          const isToday=updated.startsWith(data.today);
          badge.textContent=`最後更新：${updated}`;
          badge.className='update-badge'+(isToday?' fresh':'');
          if(isToday){
            clearInterval(timer);progInner.style.width='100%';
            setTimeout(()=>{progOuter.style.display='none';progInner.style.width='0';},600);
            portfolioData=data.stocks||[];renderAll(portfolioData);
            btn.disabled=false;btn.textContent='🌲 更新今日預測';
            showToast('✅ 預測完成！','ok');
          }
        }
      }catch(e){}
    },4000);
    setTimeout(()=>{clearInterval(timer);progOuter.style.display='none';
      btn.disabled=false;btn.textContent='🌲 更新今日預測';loadPortfolio();},600000);
  }catch(e){
    progOuter.style.display='none';btn.disabled=false;btn.textContent='🌲 更新今日預測';
    showToast('失敗：'+e.message,'err');
  }
}

function showToast(msg,type='ok'){
  const el=document.getElementById('toast');
  el.textContent=msg;el.className=`toast show ${type}`;
  setTimeout(()=>el.className='toast',3200);
}

// ── Init ──────────────────────────────────────────────
document.getElementById('addDate').value=new Date().toISOString().split('T')[0];
syncGroupSelect();
loadPortfolio();
</script>
